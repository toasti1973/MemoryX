<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory System — Episoden</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="layout">
  <nav>
    <div class="nav-logo">MemoryX <span>AI Memory System</span></div>
    <a href="index.html">&#9632; Dashboard</a>
    <a href="keys.html">&#128273; API-Keys</a>
    <a href="episodes.html" class="active">&#128196; Episoden</a>
    <a href="rules.html">&#9881; Regeln</a>
    <a href="logs.html">&#128203; Logs</a>
    <a href="system.html">&#9881; System</a>
  </nav>
  <main class="main">
    <h1>Episoden</h1>

    <div class="toolbar">
      <input id="search-input" type="text" placeholder="Suchen..." style="max-width:300px" onkeydown="if(event.key==='Enter')search()">
      <select id="ns-filter" style="max-width:180px;width:auto">
        <option value="">Alle Namespaces</option>
        <option value="global">global</option>
        <option value="project">project</option>
        <option value="desktop">desktop</option>
        <option value="cli">cli</option>
        <option value="business">business</option>
      </select>
      <button class="btn btn-primary" onclick="search()">Suchen</button>
      <span class="toolbar-spacer"></span>
      <button class="btn btn-ghost" onclick="search()">&#8635; Aktualisieren</button>
    </div>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Kategorie</th>
            <th>Outcome</th>
            <th>Kontext</th>
            <th>Agent</th>
            <th>Namespace</th>
            <th>Qualität</th>
            <th>Erstellt</th>
            <th>Aktionen</th>
          </tr>
        </thead>
        <tbody id="episodes-table">
          <tr><td colspan="8" style="color:var(--text-muted);text-align:center">Suchbegriff eingeben oder Enter drücken</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<script src="api.js"></script>
<script>
async function search() {
  const q  = document.getElementById('search-input').value.trim();
  const ns = document.getElementById('ns-filter').value;
  try {
    const params = { limit: 50 };
    if (q) params.q = q;
    if (ns) params.namespace = ns;
    const episodes = await api.episodes.list(params);
    const tbody = document.getElementById('episodes-table');
    if (episodes.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8" style="color:var(--text-muted);text-align:center">Keine Episoden gefunden</td></tr>';
      return;
    }
    tbody.innerHTML = episodes.map(ep => `
      <tr>
        <td><strong>${ep.task_category}</strong></td>
        <td><span class="badge ${outcomeClass(ep.outcome)}">${ep.outcome}</span></td>
        <td style="max-width:280px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${ep.context_summary}">${ep.context_summary}</td>
        <td>${ep.agent_id || '—'}</td>
        <td><code>${ep.namespace}</code></td>
        <td>${scoreBar(ep.quality_score)}</td>
        <td>${formatDate(ep.created_at)}</td>
        <td>
          <button class="btn btn-danger btn-sm" onclick="deleteEpisode('${ep.id}')">&#128465;</button>
        </td>
      </tr>
    `).join('');
  } catch (err) {
    showToast('Fehler: ' + err.message, 'error');
  }
}

async function deleteEpisode(id) {
  if (!confirm('Episode wirklich löschen?')) return;
  try {
    await api.episodes.delete(id);
    showToast('Episode gelöscht');
    search();
  } catch (err) {
    showToast('Fehler: ' + err.message, 'error');
  }
}

function outcomeClass(o) {
  return o === 'success' ? 'badge-green' : o === 'failure' ? 'badge-red' : 'badge-yellow';
}

function scoreBar(score) {
  const pct = Math.round((score || 0) * 100);
  const color = pct > 70 ? '#22c55e' : pct > 40 ? '#f59e0b' : '#ef4444';
  return `<div style="display:flex;align-items:center;gap:6px">
    <div style="width:60px;height:6px;background:#2e3244;border-radius:3px">
      <div style="width:${pct}%;height:100%;background:${color};border-radius:3px"></div>
    </div>
    <span style="font-size:11px;color:var(--text-muted)">${pct}%</span>
  </div>`;
}

// Initial laden
search();
</script>
</body>
</html>
