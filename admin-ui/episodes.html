<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MemoryX — Episoden</title>
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
<div class="layout">

  <nav>
    <div class="nav-logo">
      <div class="nav-logo-title">MemoryX</div>
      <div class="nav-logo-sub">AI Memory System</div>
    </div>
    <div class="nav-section">
      <div class="nav-label">Navigation</div>
      <a href="index.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </a>
      <a href="keys.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="7" cy="17" r="4"/><path d="m10.6 13.4 7-7"/><path d="m18 5 1 1"/><path d="m15 8 1 1"/></svg>
        API-Keys
      </a>
      <a href="episodes.html" class="active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
        Episoden
      </a>
      <a href="rules.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Regeln
      </a>
      <a href="logs.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        Logs
      </a>
      <a href="system.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
        System
      </a>
    </div>
    <div class="nav-footer">
      <div class="status-indicator">
        <span class="pulse" id="nav-pulse" style="background:var(--warning)"></span>
        <span id="nav-status" style="font-size:11px;color:var(--text-muted)">Verbinde...</span>
      </div>
    </div>
  </nav>

  <main class="main">
    <div class="page-header">
      <h1>Episoden</h1>
      <p>Gespeicherte Erfahrungen durchsuchen und verwalten</p>
    </div>

    <div class="toolbar">
      <input id="search-input" type="text" placeholder="Suchen..." style="max-width:280px"
             onkeydown="if(event.key==='Enter')search()">
      <select id="ns-filter" style="max-width:180px;width:auto">
        <option value="">Alle Namespaces</option>
        <option value="global">global</option>
        <option value="project">project</option>
        <option value="desktop">desktop</option>
        <option value="cli">cli</option>
        <option value="business">business</option>
      </select>
      <button class="btn btn-primary" onclick="search()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Suchen
      </button>
      <span class="toolbar-spacer"></span>
      <button class="btn btn-ghost" onclick="search()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Aktualisieren
      </button>
    </div>

    <div class="card" style="padding:0">
      <table>
        <thead>
          <tr>
            <th style="padding-left:24px">Kategorie</th>
            <th>Outcome</th>
            <th>Kontext</th>
            <th>Agent</th>
            <th>Namespace</th>
            <th>Qualität</th>
            <th>Erstellt</th>
            <th style="padding-right:24px">Aktionen</th>
          </tr>
        </thead>
        <tbody id="episodes-table">
          <tr><td colspan="8"><div class="empty-state"><p>Lade Episoden...</p></div></td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<script src="api.js?v=2"></script>
<script>
async function search() {
  const q  = document.getElementById('search-input').value.trim();
  const ns = document.getElementById('ns-filter').value;
  const tbody = document.getElementById('episodes-table');
  tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state"><p>Lade...</p></div></td></tr>';

  try {
    const params = { limit: 50 };
    if (q) params.q = q;
    if (ns) params.namespace = ns;

    const episodes = await api.episodes.list(params);

    if (!episodes || episodes.length === 0) {
      tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
        <p>Keine Episoden gefunden</p>
      </div></td></tr>`;
      return;
    }

    tbody.innerHTML = episodes.map(ep => `
      <tr>
        <td style="padding-left:24px"><strong>${escHtml(ep.task_category)}</strong></td>
        <td><span class="badge ${outcomeClass(ep.outcome)}">${escHtml(ep.outcome)}</span></td>
        <td style="max-width:260px">
          <span style="display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-muted)"
                title="${escHtml(ep.context_summary)}">${escHtml(ep.context_summary)}</span>
        </td>
        <td style="color:var(--text-muted)">${escHtml(ep.agent_id) || '—'}</td>
        <td><code>${escHtml(ep.namespace)}</code></td>
        <td>${scoreBar(ep.quality_score)}</td>
        <td style="color:var(--text-muted);white-space:nowrap">${formatDate(ep.created_at)}</td>
        <td style="padding-right:24px">
          <button class="btn btn-danger btn-icon btn-sm" title="Löschen" onclick="deleteEpisode('${ep.id}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </td>
      </tr>
    `).join('');
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><p style="color:var(--error)">Fehler: ${escHtml(err.message)}</p></div></td></tr>`;
    showToast('Fehler: ' + err.message, 'error');
  }
}

async function deleteEpisode(id) {
  if (!confirm('Episode wirklich löschen?')) return;
  try {
    await api.episodes.delete(id);
    showToast('Episode gelöscht');
    search();
  } catch (err) {
    showToast('Fehler: ' + err.message, 'error');
  }
}

function outcomeClass(o) {
  if (o === 'success') return 'badge-green';
  if (o === 'failure') return 'badge-red';
  return 'badge-yellow';
}

function scoreBar(score) {
  const pct   = Math.round((score || 0) * 100);
  const color = pct > 70 ? 'var(--success)' : pct > 40 ? 'var(--warning)' : 'var(--error)';
  return `<div class="score-bar">
    <div class="score-track"><div class="score-fill" style="width:${pct}%;background:${color}"></div></div>
    <span class="score-label">${pct}%</span>
  </div>`;
}

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function initNav() {
  try {
    await api.health();
    document.getElementById('nav-pulse').style.background = 'var(--success)';
    document.getElementById('nav-status').textContent = 'Online';
  } catch (e) {
    document.getElementById('nav-pulse').style.background = 'var(--error)';
    document.getElementById('nav-status').textContent = 'Fehler';
  }
}

initNav();
search();
</script>
</body>
</html>
